name: Build tola.dylib

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build iOS dylib
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: bash build_macos.sh

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: tola-dylib
          path: build/tola.dylib
          if-no-files-found: error
